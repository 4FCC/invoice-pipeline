services:

  api:
    build: ./api
    container_name: invoice-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: invoice-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    environment:
      - TZ=America/Guatemala
      - GENERIC_TIMEZONE=America/Guatemala
      - N8N_IMPORT_EXPORT_WORKFLOWS_PATH=/workflows
    restart: unless-stopped

volumes:
  n8n_data:
